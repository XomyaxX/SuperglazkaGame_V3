<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подтвердите подписку — Суперглазка</title>
<style>
body { margin:0; padding:0; background:#0f0a1e; font-family:'Segoe UI',Tahoma,sans-serif; }
.container { max-width:560px; margin:0 auto; background:#1a0b2e; color:#fff; border-radius:16px; overflow:hidden; }
.header { background:linear-gradient(135deg,#9333ea,#e879f9); padding:32px 24px; text-align:center; }
.header h1 { margin:0; font-size:24px; font-weight:800; }
.content { padding:24px; text-align:center; }
.cta { display:inline-block; margin-top:16px; background:linear-gradient(135deg,#c084fc,#e879f9); color:#fff; text-decoration:none; padding:12px 28px; border-radius:50px; font-weight:700; font-size:14px; }
.footer { padding:16px 24px; text-align:center; font-size:12px; color:rgba(255,255,255,0.4); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>👁️ Суперглазка</h1>
  </div>
  <div class="content">
    <p style="color:rgba(255,255,255,0.8); font-size:16px; line-height:1.6;">Вы подписались на уведомления о новых эпизодах. Чтобы завершить подписку, нажмите кнопку ниже:</p>
    <a href="{{confirmUrl}}" class="cta">✅ Подтвердить подписку</a>
    <p style="color:rgba(255,255,255,0.5); font-size:13px; margin-top:16px;">Если вы не подписывались, просто проигнорируйте это письмо.</p>
  </div>
  <div class="footer">
    <p>© {{year}} Суперглазка. Все права защищены.</p>
  </div>
</div>
</body>
</html>
