<div class="cookie-banner" id="cookieBanner">

  </div>

<script>
  (function() {
    if (!localStorage.getItem('cookie_consent')) {
      document.getElementById('cookieBanner').classList.add('visible');
    }
    document.getElementById('cookieAccept').addEventListener('click', function() {
      localStorage.setItem('cookie_consent', 'true');
      document.getElementById('cookieBanner').classList.remove('visible');
    });
  })();
</script>

<script>
(function() {
  var params = new URLSearchParams(location.search);
  var slug = params.get('slug');
  var container = document.getElementById('postContent');
  var relatedSection = document.getElementById('relatedSection');
  var relatedGrid = document.getElementById('relatedGrid');

  function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function formatDate(iso) {
    if (!iso) return '';
    try { return new Date(iso).toLocaleDateString('ru-RU'); } catch(e) { return iso; }
  }

  function renderSchema(post) {
    var existing = document.getElementById('schema-article');
    if (existing) existing.remove();
    var script = document.createElement('script');
    script.type = 'application/ld+json';
    script.id = 'schema-article';
    script.textContent = JSON.stringify({
      '@context': 'https://schema.org',
      '@type': 'Article',
      headline: post.title,
      description: post.excerpt || '',
      image: post.image ? 'https://vidial-media.ru/' + post.image : 'https://vidial-media.ru/assets/shared/characters/superglazka.png',
      datePublished: post.created_at,
      author: { '@type': 'Organization', name: 'Суперглазка', '@id': 'https://vidial-media.ru/#organization' },
      publisher: { '@type': 'Organization', name: 'Суперглазка', logo: { '@type': 'ImageObject', url: 'https://vidial-media.ru/assets/shared/characters/superglazka.png' } },
      mainEntityOfPage: { '@type': 'WebPage', '@id': 'https://vidial-media.ru/blog-post.html?slug=' + post.slug }
    });
    document.head.appendChild(script);
  }

  function renderPost(post) {
    document.title = post.title + ' — Блог Суперглазки';
    var metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) metaDesc.setAttribute('content', post.excerpt || '');
    renderSchema(post);

    var img = '';
    if (post.image) {
      var webp = post.image.replace(/\.png$/i, '.webp');
      img = '<picture><source srcset="' + escapeHtml(webp) + '" type="image/webp"><img class="blog-article-img" src="' + escapeHtml(post.image) + '" alt="' + escapeHtml(post.title) + '" width="720" height="380"></picture>';
    }
    container.innerHTML = '<article class="blog-article">' +
      '<div class="blog-article-meta">' +
        '<span class="blog-article-tag">' + escapeHtml(post.category || 'Статья') + '</span>' +
        '<span class="blog-article-date">' + escapeHtml(formatDate(post.created_at)) + '</span>' +
      '</div>' +
      '<h1>' + escapeHtml(post.title) + '</h1>' +
      img +
      '<div class="blog-article-body">' + (post.content || '') + '</div>' +
    '</article>';
    renderRelated(post);
  }

  function renderRelated(currentPost) {
    var pool = (window.BLOG_POSTS || []).filter(function(p) {
      return p.slug !== currentPost.slug && p.category === currentPost.category;
    });
    if (pool.length === 0) {
      pool = (window.BLOG_POSTS || []).filter(function(p) { return p.slug !== currentPost.slug; });
    }
    if (pool.length === 0) return;
    // Shuffle and pick 3
    for (var i = pool.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = pool[i]; pool[i] = pool[j]; pool[j] = t;
    }
    var picks = pool.slice(0, 3);
    relatedGrid.innerHTML = picks.map(function(p) {
      return '<a href="blog-post.html?slug=' + encodeURIComponent(p.slug) + '" class="blog-related-card">' +
        '<h3>' + escapeHtml(p.title) + '</h3>' +
        '<span>' + escapeHtml(p.category || '') + ' · ' + escapeHtml(formatDate(p.created_at)) + '</span>' +
      '</a>';
    }).join('');
    relatedSection.style.display = '';
  }

  function renderError() {
    container.innerHTML = '<div class="blog-error" data-i18n="blog.error">' + (window.I18n ? I18n.t('blog.error') : 'Не удалось загрузить статью') + '</div>';
  }

  if (!slug) {
    renderError();
    return;
  }

  // Try API first
  fetch('/api/blog/' + encodeURIComponent(slug))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success && data.post) {
        renderPost(data.post);
      } else {
        // Fallback to local data
        var local = (window.BLOG_POSTS || []).find(function(p) { return p.slug === slug; });
        if (local) renderPost(local); else renderError();
      }
    })
    .catch(function() {
      var local = (window.BLOG_POSTS || []).find(function(p) { return p.slug === slug; });
      if (local) renderPost(local); else renderError();
    });
})();

const savedTheme = localStorage.getItem('superglazka_theme');
if (savedTheme) document.body.classList.add('theme-' + savedTheme);
</script>
<script>I18n.init();</script>
