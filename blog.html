<style>
.blog-page {
  min-height: 100vh;
  background: linear-gradient(180deg, #0a0618 0%, #1a0b2e 40%, #0f0718 100%);
  padding-bottom: 80px;
}
.theme-light .blog-page {
  background: linear-gradient(180deg, #f3e8ff 0%, #ffe4f0 40%, #f8eeff 100%);
}
.blog-header {
  padding: 24px max(24px, env(safe-area-inset-left));

  align-items: center;
  justify-content: space-between;
  max-width: 1200px;

.blog-header .land-logo {
  font-family: 'Comfortaa', cursive;

  font-weight: 700;

  text-decoration: none;

}
.theme-light .blog-header .land-logo { color: #3d1a5c; }
.blog-back {
  color: rgba(255,255,255,0.7);
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  transition: color .2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.blog-back:hover { color: #c084fc; }
.theme-light .blog-back { color: rgba(0,0,0,0.6); }
.theme-light .blog-back:hover { color: #e056c8; }
.blog-hero {
  text-align: center;
  padding: 40px 24px 20px;
  max-width: 800px;
  margin: 0 auto;
}
.blog-hero h1 {
  font-family: 'Comfortaa', cursive;
  font-size: clamp(28px, 5vw, 42px);
  color: #fff;
  margin-bottom: 12px;
}
.theme-light .blog-hero h1 { color: #3d1a5c; }
.blog-hero p {
  font-size: 16px;
  color: rgba(255,255,255,0.65);
  line-height: 1.6;
}
.theme-light .blog-hero p { color: rgba(0,0,0,0.6); }

/* Search & Filters */
.blog-controls {
  max-width: 800px;
  margin: 0 auto 28px;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.blog-search-wrap {
  position: relative;
}
.blog-search-wrap input {
  width: 100%;
  padding: 14px 18px 14px 44px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 15px;
  font-family: 'Nunito', sans-serif;
  outline: none;
  transition: all .2s;
}
.blog-search-wrap input::placeholder { color: rgba(255,255,255,0.4); }
.blog-search-wrap input:focus {
  border-color: rgba(192,132,252,0.5);
  background: rgba(255,255,255,0.08);
}
.theme-light .blog-search-wrap input {
  background: rgba(255,255,255,0.6);
  border-color: rgba(0,0,0,0.08);
  color: #3d1a5c;
}
.theme-light .blog-search-wrap input::placeholder { color: rgba(0,0,0,0.35); }
.theme-light .blog-search-wrap input:focus {
  border-color: rgba(224,86,200,0.5);
}
.blog-search-wrap::before {
  content: '🔎';
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  opacity: .6;
  pointer-events: none;
}
.blog-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.blog-filter-chip {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.75);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  font-family: 'Nunito', sans-serif;
}
.blog-filter-chip:hover {
  border-color: rgba(192,132,252,0.4);
  color: #fff;
}
.blog-filter-chip.active {
  background: rgba(192,132,252,0.25);
  border-color: rgba(192,132,252,0.5);
  color: #fff;
}
.theme-light .blog-filter-chip {
  background: rgba(255,255,255,0.6);
  border-color: rgba(0,0,0,0.08);
  color: rgba(0,0,0,0.6);
}
.theme-light .blog-filter-chip:hover {
  border-color: rgba(224,86,200,0.4);
  color: #3d1a5c;
}
.theme-light .blog-filter-chip.active {
  background: rgba(224,86,200,0.15);
  border-color: rgba(224,86,200,0.5);
  color: #3d1a5c;
}

/* Blog Grid */
.blog-grid {
  max-width: 800px;
  margin: 0 auto;
  padding: 0 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.blog-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  overflow: hidden;
  backdrop-filter: blur(12px);
  transition: all .3s var(--ease-spring);
  display: flex;
  flex-direction: column;
}
.blog-card:hover {
  transform: translateY(-4px);
  border-color: rgba(192,132,252,0.3);
  box-shadow: 0 12px 32px rgba(0,0,0,0.2);
}
.theme-light .blog-card {
  background: rgba(255,255,255,0.6);
  border-color: rgba(0,0,0,0.06);
}
.blog-card-img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
  background: linear-gradient(135deg, rgba(192,132,252,0.1), rgba(6,182,212,0.1));
}
.blog-card-body {
  padding: 20px;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.blog-card-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.blog-card-tag {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: #c084fc;
  background: rgba(192,132,252,0.1);
  padding: 4px 10px;
  border-radius: 8px;
}
.theme-light .blog-card-tag {
  color: #e056c8;
  background: rgba(224,86,200,0.08);
}
.blog-card-date {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
}
.theme-light .blog-card-date { color: rgba(0,0,0,0.35); }
.blog-card h2 {
  font-family: 'Comfortaa', cursive;
  font-size: 18px;
  color: #fff;
  margin-bottom: 10px;
  line-height: 1.35;
}
.theme-light .blog-card h2 { color: #3d1a5c; }
.blog-card p {
  font-size: 14px;
  color: rgba(255,255,255,0.65);
  line-height: 1.65;
  margin-bottom: 16px;
  flex: 1;
}
.theme-light .blog-card p { color: rgba(0,0,0,0.6); }
.blog-card-btn {
  display: inline-flex;
  align-self: flex-start;
  padding: 10px 20px;
  border-radius: 12px;
  background: linear-gradient(135deg, #c084fc, #a855f7);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
  transition: transform .2s, box-shadow .2s;
}
.blog-card-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(192,132,252,0.3);
}
.blog-loading, .blog-error, .blog-empty {
  text-align: center;
  padding: 60px 24px;
  color: rgba(255,255,255,0.6);
  font-size: 16px;
  grid-column: 1 / -1;
}
.theme-light .blog-loading, .theme-light .blog-error, .theme-light .blog-empty {
  color: rgba(0,0,0,0.55);
}
@media (max-width: 768px) {
  .blog-header { padding: 16px 20px; }
  .blog-grid, .blog-controls { padding: 0 20px; }
  .blog-grid { grid-template-columns: 1fr; }
}

<body>

<div class="blog-page">
  <header class="blog-header">
    <a href="index.html" class="land-logo"><span class="land-logo-pretitle">Игросказка</span><span class="land-logo-title">👁️ СУПЕРГЛАЗКА</span></a>
    <a href="index.html" data-i18n="nav.home" class="blog-back">← На главную</a>
  </header>

  <div class="blog-hero">
    <h1 data-i18n="blog.title">Блог Суперглазки</h1>
    <p data-i18n="blog.subtitle">Полезные советы о здоровье глаз для детей и родителей</p>
  </div>

  <div class="blog-controls">
    <div class="blog-search-wrap">
      <input type="search" id="blogSearch" placeholder="Поиск по статьям..." data-i18n-placeholder="blog.searchPlaceholder">
    </div>

  </footer>
</div>

<div class="cookie-banner" id="cookieBanner">
  <div class="cookie-banner-text">
    <span data-i18n="cookieBanner.text">Мы используем localStorage для сохранения прогресса и настроек.</span>
    <a href="privacy.html" data-i18n="cookieBanner.privacy">Политика конфиденциальности</a>
  </div>
  <button class="cookie-banner-btn" id="cookieAccept" data-i18n="cookieBanner.accept">Принять</button>
</div>
<script>
  (function() {
    if (!localStorage.getItem('cookie_consent')) {
      document.getElementById('cookieBanner').classList.add('visible');
    }
    document.getElementById('cookieAccept').addEventListener('click', function() {
      localStorage.setItem('cookie_consent', 'true');
      document.getElementById('cookieBanner').classList.remove('visible');
    });
  })();
</script>

<script>
(function() {
  const grid = document.getElementById('blogGrid');
  const searchInput = document.getElementById('blogSearch');
  const filtersWrap = document.getElementById('blogFilters');
  let allPosts = [];
  let activeCategory = 'all';

  const CATEGORIES = [
    { key: 'all', label: 'Все' },
    { key: 'Здоровье глаз', label: 'Здоровье глаз' },
    { key: 'ЗОЖ', label: 'ЗОЖ' },
    { key: 'Мультипликация', label: 'Мультипликация' },
    { key: 'Образование', label: 'Образование' }
  ];

  function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function formatDate(iso) {
    if (!iso) return '';
    try {
      return new Date(iso).toLocaleDateString('ru-RU');
    } catch(e) { return iso; }
  }

  function renderFilters() {
    filtersWrap.innerHTML = CATEGORIES.map(function(cat) {
      return '<button class="blog-filter-chip' + (activeCategory === cat.key ? ' active' : '') + '" data-cat="' + escapeHtml(cat.key) + '">' + escapeHtml(cat.label) + '</button>';
    }).join('');
    filtersWrap.querySelectorAll('.blog-filter-chip').forEach(function(btn) {
      btn.addEventListener('click', function() {
        activeCategory = this.getAttribute('data-cat');
        renderFilters();
        renderPosts();
      });
    });
  }

  function getFilteredPosts() {
    var term = (searchInput.value || '').toLowerCase().trim();
    return allPosts.filter(function(post) {
      if (activeCategory !== 'all' && post.category !== activeCategory) return false;
      if (!term) return true;
      var text = (post.title + ' ' + (post.excerpt || '') + ' ' + (post.category || '')).toLowerCase();
      return text.indexOf(term) !== -1;
    });
  }

  function renderPosts() {
    var posts = getFilteredPosts();
    if (!posts || posts.length === 0) {
      grid.innerHTML = '<div class="blog-empty">' + (window.I18n ? I18n.t('blog.empty') : 'Ничего не найдено. Попробуй другой запрос!') + '</div>';
      return;
    }
    grid.innerHTML = posts.map(function(post) {
      var date = formatDate(post.created_at);
      var img = post.image ? '<img class="blog-card-img" src="' + escapeHtml(post.image) + '" alt="' + escapeHtml(post.title) + '" loading="lazy">' : '';
      return '<article class="blog-card reveal">' +
        img +
        '<div class="blog-card-body">' +
          '<div class="blog-card-meta">' +
            '<span class="blog-card-tag">' + escapeHtml(post.category || 'Статья') + '</span>' +
            '<span class="blog-card-date">' + escapeHtml(date) + '</span>' +
          '</div>' +
          '<h2>' + escapeHtml(post.title) + '</h2>' +
          '<p>' + escapeHtml(post.excerpt || '') + '</p>' +
          '<a href="blog-post.html?slug=' + encodeURIComponent(post.slug) + '" class="blog-card-btn">' + (window.I18n ? I18n.t('blog.readMore') : 'Читать') + '</a>' +
        '</div>' +
      '</article>';
    }).join('');
    // Re-init reveal animations
    document.querySelectorAll('.reveal').forEach(function(el) {
      el.style.opacity = '0';
      el.style.transform = 'translateY(20px)';
      el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
      observer.observe(el);
    });
  }

  searchInput.addEventListener('input', function() {
    renderPosts();
  });

  renderFilters();

  fetch('/api/blog')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success && data.posts && data.posts.length) {
        allPosts = data.posts;
      } else {
        allPosts = window.BLOG_POSTS || [];
      }
      renderPosts();
    })
    .catch(function() {
      allPosts = window.BLOG_POSTS || [];
      renderPosts();
    });
})();

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.style.opacity = '1';
      entry.target.style.transform = 'translateY(0)';
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.reveal').forEach(el => {
  el.style.opacity = '0';
  el.style.transform = 'translateY(20px)';
  el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
  observer.observe(el);
});

const savedTheme = localStorage.getItem('superglazka_theme');
if (savedTheme) document.body.classList.add('theme-' + savedTheme);
</script>
<script>I18n.init();</script>
