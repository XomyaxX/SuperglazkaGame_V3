<body>

<div class="blog-page">
  <header class="blog-header">
    <a href="index.html" class="land-logo"><span class="land-logo-pretitle">Игросказка</span><span class="land-logo-title">👁️ СУПЕРГЛАЗКА</span></a>
    <a href="index.html" data-i18n="nav.home" class="blog-back">← На главную</a>
  </header>

  <div class="blog-hero">
    <h1 data-i18n="blog.title">Блог Суперглазки</h1>
    <p data-i18n="blog.subtitle">Полезные советы о здоровье глаз для детей и родителей</p>

  <div class="blog-list" id="blogList">

  </footer>

<div class="cookie-banner" id="cookieBanner">
  <div class="cookie-banner-text">
    <span data-i18n="cookieBanner.text">Мы используем localStorage для сохранения прогресса и настроек.</span>
    <a href="privacy.html" data-i18n="cookieBanner.privacy">Политика конфиденциальности</a>
  </div>
  <button class="cookie-banner-btn" id="cookieAccept" data-i18n="cookieBanner.accept">Принять</button>
</div>
<script>
  (function() {
    if (!localStorage.getItem('cookie_consent')) {
      document.getElementById('cookieBanner').classList.add('visible');
    }
    document.getElementById('cookieAccept').addEventListener('click', function() {
      localStorage.setItem('cookie_consent', 'true');
      document.getElementById('cookieBanner').classList.remove('visible');
    });
  })();
</script>

<script>
// Load blog posts dynamically
(function() {
  const list = document.getElementById('blogList');

  function renderPosts(posts) {
    if (!posts || posts.length === 0) {
      list.innerHTML = '<div class="blog-empty" data-i18n="blog.empty">' + (window.I18n ? I18n.t('blog.empty') : 'Пока нет статей. Загляни позже!') + '</div>';
      return;
    }
    list.innerHTML = posts.map(function(post) {
      const date = post.created_at ? new Date(post.created_at).toLocaleDateString('ru-RU') : '';
      const category = post.category || 'Совет дня';
      const excerpt = post.excerpt || '';
      const image = post.image ? '<img src="' + post.image + '" alt="' + escapeHtml(post.title) + '" style="width:100%;border-radius:12px;margin-bottom:16px;max-height:300px;object-fit:cover;">' : '';
      return '<article class="blog-card reveal">' +
        image +
        '<h2>' + escapeHtml(post.title) + '</h2>' +
        '<div class="blog-meta">' + (date ? date + ' · ' : '') + escapeHtml(category) + '</div>' +
        '<p>' + escapeHtml(excerpt) + '</p>' +
      '</article>';
    }).join('');
    // Re-init reveal animations
    document.querySelectorAll('.reveal').forEach(function(el) {
      el.style.opacity = '0';
      el.style.transform = 'translateY(20px)';
      el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
      observer.observe(el);
    });
  }

  function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  fetch('/api/blog')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        renderPosts(data.posts);
      } else {
        list.innerHTML = '<div class="blog-error" data-i18n="blog.error">' + (window.I18n ? I18n.t('blog.error') : 'Не удалось загрузить статьи') + '</div>';
      }
    })
    .catch(function() {
      // Fallback to hardcoded posts if API fails
      renderPosts([
        {
          title: '🎯 Правило 20-20-20 для детских глаз',
          excerpt: 'Каждые 20 минут экранного времени ребёнок должен смотреть на предмет в 20 футах (≈6 метров) в течение 20 секунд. Это простое правило помогает расслабить глазные мышцы и предотвратить цифровое зрительное утомление.',
          category: 'Совет дня',
          created_at: '2026-05-20'
        },
        {
          title: '👀 5 признаков усталости глаз у ребёнка',
          excerpt: 'Дети часто не говорят о проблемах со зрением напрямую. Частое моргание, головная боль, нежелание читать, прищуривание и красные глаза — вот на что стоит обратить внимание.',
          category: 'Здоровье',
          created_at: '2026-05-15'
        },
        {
          title: '👓 Как выбрать первые очки ребёнку',
          excerpt: 'Первые очки — важное событие. Выбирайте лёгкую оправу, поликарбонатные линзы, приучайте постепенно и позвольте ребёнку выбрать цвет самостоятельно.',
          category: 'Практика',
          created_at: '2026-05-10'
        }
      ]);
    });
})();

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.style.opacity = '1';
      entry.target.style.transform = 'translateY(0)';
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.reveal').forEach(el => {
  el.style.opacity = '0';
  el.style.transform = 'translateY(20px)';
  el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
  observer.observe(el);
});

const savedTheme = localStorage.getItem('superglazka_theme');
if (savedTheme) document.body.classList.add('theme-' + savedTheme);
</script>
<script>I18n.init();</script>
