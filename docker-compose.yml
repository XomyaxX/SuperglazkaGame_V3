version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: superglazka-backend
    restart: unless-stopped
    env_file:
      - server/.env
    volumes:
      - sqlite_data:/app/data
      - ./server/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - superglazka-net

  frontend:
    image: nginx:alpine
    container_name: superglazka-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot-data:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - superglazka-net

volumes:
  sqlite_data:

networks:
  superglazka-net:
    driver: bridge
