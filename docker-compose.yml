version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: superglazka-backend
    restart: unless-stopped
    env_file:
      - server/.env
    volumes:
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - superglazka-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: superglazka-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot-data:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - superglazka-net

volumes:
  sqlite_data:

networks:
  superglazka-net:
    driver: bridge
